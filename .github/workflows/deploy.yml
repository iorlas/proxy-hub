name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  G3PROXY_IMAGE: ghcr.io/${{ github.repository_owner }}/proxy-hub-g3proxy
  HEALTH_IMAGE: ghcr.io/${{ github.repository_owner }}/proxy-hub-health
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/proxy-hub-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "tag=main-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push g3proxy
        uses: docker/build-push-action@v6
        with:
          context: ./g3proxy
          push: true
          cache-from: type=gha,scope=g3proxy
          cache-to: type=gha,mode=max,scope=g3proxy
          tags: ${{ env.G3PROXY_IMAGE }}:${{ steps.tag.outputs.tag }}

      - name: Build and push health-checker
        uses: docker/build-push-action@v6
        with:
          context: ./health-checker
          push: true
          cache-from: type=gha,scope=health
          cache-to: type=gha,mode=max,scope=health
          tags: ${{ env.HEALTH_IMAGE }}:${{ steps.tag.outputs.tag }}

      - name: Build and push proxy-api
        uses: docker/build-push-action@v6
        with:
          context: ./proxy-api
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          tags: ${{ env.API_IMAGE }}:${{ steps.tag.outputs.tag }}

      - name: Deploy to Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          TAILSCALE_IP: ${{ secrets.TAILSCALE_IP }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          ZEP_FQDN: ${{ secrets.ZEP_FQDN }}
          MAC_FQDN: ${{ secrets.MAC_FQDN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          ENV_STRING="IMAGE_TAG=${IMAGE_TAG}
          TAILSCALE_IP=${TAILSCALE_IP}
          REDIS_PASSWORD=${REDIS_PASSWORD}
          ZEP_FQDN=${ZEP_FQDN}
          MAC_FQDN=${MAC_FQDN}
          GITHUB_OWNER=${GITHUB_OWNER}"

          # Update env vars
          curl -sf -X POST "${DOKPLOY_URL}/api/compose.update" \
            -H "X-API-Key: ${DOKPLOY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"composeId\": \"${COMPOSE_ID}\", \"env\": $(echo "$ENV_STRING" | jq -Rs .)}"

          # Update compose file
          curl -sf -X POST "${DOKPLOY_URL}/api/compose.update" \
            -H "X-API-Key: ${DOKPLOY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"composeId\": \"${COMPOSE_ID}\", \"composeFile\": $(cat docker-compose.prod.yml | jq -Rs .)}"

          # Trigger redeploy
          curl -sf -X POST "${DOKPLOY_URL}/api/compose.redeploy" \
            -H "X-API-Key: ${DOKPLOY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"composeId\": \"${COMPOSE_ID}\"}"

          echo "Deploy triggered with IMAGE_TAG=${IMAGE_TAG}"
