repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd proxy-scanner && uv run ruff format .'
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd proxy-scanner && uv run ruff check --fix .'
        language: system
        types: [python]
        pass_filenames: false

      - id: ty
        name: ty type check
        entry: bash -c 'cd proxy-scanner && uvx ty check .'
        language: system
        types: [python]
        pass_filenames: false
