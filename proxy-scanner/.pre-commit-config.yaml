# Install: brew install prek && prek install
repos:
  - repo: local
    hooks:
      - id: fix
        name: auto-fix (ruff)
        entry: make -C proxy-scanner fix
        language: system
        pass_filenames: false
        always_run: true

      - id: lint
        name: lint (ruff + ty + yamllint)
        entry: make -C proxy-scanner lint
        language: system
        pass_filenames: false
        always_run: true
