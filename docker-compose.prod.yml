services:
  g3proxy:
    image: ghcr.io/${GITHUB_OWNER}/proxy-hub-g3proxy:${IMAGE_TAG}
    hostname: proxy-hub
    ports:
      - "${TAILSCALE_IP}:2080:2080"
      - "${TAILSCALE_IP}:2081:2081"
      - "${TAILSCALE_IP}:2880:2880"
      - "${TAILSCALE_IP}:2881:2881"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "g3proxy -V"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    pull_policy: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --bind 0.0.0.0
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  health-checker:
    image: ghcr.io/${GITHUB_OWNER}/proxy-hub-health:${IMAGE_TAG}
    environment:
      - ZEP_FQDN=${ZEP_FQDN}
      - MAC_FQDN=${MAC_FQDN}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  proxy-api:
    image: ghcr.io/${GITHUB_OWNER}/proxy-hub-api:${IMAGE_TAG}
    hostname: proxy-api
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - scanner-data:/data

volumes:
  redis-data:
  scanner-data:

networks:
  dokploy-network:
    external: true
