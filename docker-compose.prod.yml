services:
  g3proxy:
    image: ghcr.io/${GITHUB_OWNER}/proxy-hub-g3proxy:${IMAGE_TAG:-latest}
    ports:
      - "${TAILSCALE_IP}:1080:1080"
      - "${TAILSCALE_IP}:8080:8080"
    environment:
      - TAILSCALE_IP=${TAILSCALE_IP}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
    volumes:
      - g3proxy-cache:/var/cache/g3proxy
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --bind 0.0.0.0
    volumes:
      - redis-data:/data
    restart: unless-stopped

  health-checker:
    image: ghcr.io/${GITHUB_OWNER}/proxy-hub-health:${IMAGE_TAG:-latest}
    environment:
      - ZEP_FQDN=${ZEP_FQDN}
      - MAC_FQDN=${MAC_FQDN}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  redis-data:
  g3proxy-cache:

networks:
  dokploy-network:
    external: true
