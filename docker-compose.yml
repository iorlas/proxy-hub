services:
  g3proxy:
    build:
      context: ./g3proxy
      dockerfile: Dockerfile
    ports:
      - "1080:1080"
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - g3proxy-cache:/var/cache/g3proxy
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpass} --bind 0.0.0.0
    volumes:
      - redis-data:/data

  health-checker:
    build:
      context: ./health-checker
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - redis

  proxy-scanner:
    build:
      context: ./proxy-scanner
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - scanner-data:/data
    depends_on:
      - redis

volumes:
  redis-data:
  g3proxy-cache:
  scanner-data:
