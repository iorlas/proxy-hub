services:
  g3proxy:
    build:
      context: ./g3proxy
      dockerfile: Dockerfile
    network_mode: host
    env_file:
      - .env
    volumes:
      - g3proxy-cache:/var/cache/g3proxy
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpass} --bind 127.0.0.1
    network_mode: host
    volumes:
      - redis-data:/data

  health-checker:
    build:
      context: ./health-checker
      dockerfile: Dockerfile
    network_mode: host
    env_file:
      - .env
    depends_on:
      - redis

volumes:
  redis-data:
  g3proxy-cache:
